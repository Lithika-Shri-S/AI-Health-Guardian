<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - AI Health Guardian</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">
    <div class="background-animation"></div>
    
    <div class="auth-container glass-panel">
        <div class="logo justify-center mb-4">
            <i class="fa-solid fa-heart-pulse"></i>
            <h2>HealthGuard</h2>
        </div>
        
        <h3 class="auth-title">Create Account</h3>
        <p class="auth-subtitle">Join AI Health Guardian today</p>

        <form id="signupForm" class="auth-form">
            <div class="form-group">
                <label>Full Name</label>
                <div class="input-with-icon">
                    <i class="fa-regular fa-user"></i>
                    <input type="text" id="name" placeholder="John Doe" required>
                </div>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <div class="input-with-icon">
                    <i class="fa-regular fa-envelope"></i>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <div class="input-with-icon">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" placeholder="Create a password" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100">Sign Up <i class="fa-solid fa-user-plus"></i></button>
            <div id="authError" class="auth-error hidden"></div>
        </form>

        <p class="auth-switch">Already have an account? <a href="login.html">Login here</a></p>
    </div>

    <script src="auth.js"></script>
</body>
</html>
